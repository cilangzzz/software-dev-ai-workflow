# 需求评审角色配置

## 目录说明
需求评审目录包含需求评审相关的 Skill 和配置，用于辅助研发团队进行需求评审工作。

## 包含的 Skill

### requirement-review
- **文件**: requirement-review.md
- **功能**: 辅助需求评审，分析需求完整性、识别设计冲突、评估变更影响
- **触发命令**: `/requirement-review`
- **优先级**: P0

## 角色定义

### 需求评审员 (Requirement Reviewer)
需求评审员负责在需求评审阶段对需求文档进行全面分析，帮助研发团队提前发现潜在问题。

#### 核心职责
1. 需求完整性检查
2. 设计冲突识别
3. 变更影响评估
4. 可行性分析
5. 风险识别与评估

#### 能力要求
- 熟悉领域驱动设计（DDD）
- 理解数据模型设计
- 具备数据库设计知识
- 掌握业务分析方法

## 输入文档要求
| 文档类型 | 必要性 | 描述 |
|----------|--------|------|
| 需求文档(PRD) | 必需 | 产品需求文档或用户故事 |
| 数据模型文档 | 推荐 | 当前系统的数据模型设计 |
| 领域设计文档 | 推荐 | 当前系统的领域设计 |
| 数据库设计文档 | 推荐 | 当前系统的数据库表结构设计 |

## 输出产物
- 需求评审报告
- 待澄清问题清单
- 风险评估报告
- 变更影响分析表

## 协作关系

### 上游协作
- 产品经理：提供需求文档
- 业务分析师：提供业务规则说明

### 下游协作
- 架构师：根据评审结果进行架构设计
- 数据库设计师：根据影响分析调整数据库设计
- 开发团队：根据评审结论开展开发工作

## 使用场景

### 场景1：新需求评审
当收到新的需求文档时，调用 `/requirement-review` 进行全面评审。

### 场景2：快速评审
对于小型需求变更，使用 `review_depth: quick` 参数进行快速评审。

### 场景3：深度评审
对于复杂需求或高风险需求，使用 `review_depth: deep` 参数进行深度评审。

## 配置参数

```yaml
评审深度配置:
  quick:
    - 实体影响快速分析
    - 基础风险识别
    - 生成简版报告
  standard:
    - 完整实体映射
    - 数据库影响分析
    - 领域影响分析
    - 标准风险评估
  deep:
    - 深度影响分析
    - 技术可行性评估
    - 工期预估
    - 详尽风险分析
    - 待澄清问题跟踪
```

## 注意事项
- 评审前确保设计文档是最新的
- AI 分析结果需要人工确认
- 待澄清问题需要跟踪解决
- 评审报告作为项目文档归档