# 架构设计角色配置

## 目录说明
架构设计目录包含架构设计相关的 Skill 和配置，用于记录和管理技术决策，建立可追溯的技术决策知识库。

## 包含的 Skill

### adr
- **文件**: adr.md
- **功能**: 创建和管理架构决策记录（Architecture Decision Record）
- **触发命令**: `/adr`
- **优先级**: P0

## 角色定义

### 架构决策记录员 (Architecture Decision Recorder)
架构决策记录员负责创建和管理 ADR 文档，记录重要的技术决策及其背景、影响。

#### 核心职责
1. 技术决策记录
2. 备选方案分析
3. 权衡评估
4. 影响预测
5. 决策追溯管理

#### 能力要求
- 熟悉系统架构设计原则
- 理解技术选型评估方法
- 掌握权衡分析方法
- 具备风险识别能力

## ADR 状态定义

| 状态 | 描述 | 使用场景 |
|------|------|----------|
| Proposed | 提议中 | 决策刚提出，待讨论 |
| Accepted | 已接受 | 决策已通过，开始执行 |
| Deprecated | 已弃用 | 决策不再推荐使用 |
| Superseded | 已取代 | 被新决策替代 |

## ADR 文档结构

### 必要章节
1. **状态** - 决策当前状态
2. **背景** - 导致此决策的情况和问题
3. **决策** - 决策内容和理由
4. **影响** - 决策的后果和风险

### 可选章节
1. **备选方案** - 考虑过的其他方案
2. **相关决策** - 关联的其他ADR
3. **参考** - 相关文档链接
4. **更新历史** - 状态变更记录

## 输入参数
| 参数名 | 必要性 | 描述 |
|--------|--------|------|
| title | 必需 | 决策标题 |
| context | 必需 | 决策背景和上下文 |
| decision | 可选 | 决策内容（AI可辅助生成） |
| alternatives | 可选 | 备选方案列表 |

## 输出产物
- ADR 文档（标准格式）
- 备选方案对比表
- 影响评估报告
- 决策追溯索引

## 协作关系

### 上游协作
- 架构师：提供技术决策建议
- 技术负责人：确认决策方案

### 下游协作
- 开发团队：执行技术决策
- 运维团队：落实运维要求
- 文档管理：归档ADR文档

## 使用场景

### 场景1：技术选型决策
记录技术栈选型的决策过程，如数据库选型、框架选型等。

### 场景2：架构变更决策
记录系统架构调整的决策，如服务拆分、模块重构等。

### 场景3：最佳实践决策
记录团队约定的最佳实践和设计原则。

## ADR 编号规则

```yaml
编号格式: ADR-{序号}
示例:
  - ADR-001: 选择PostgreSQL作为主数据库
  - ADR-002: 使用Redis作为分布式缓存
  - ADR-003: 采用微服务架构

存储位置: docs/adr/
命名规则: ADR-{序号}-{简短标题}.md
```

## 决策分类

```yaml
技术选型类:
  examples:
    - 数据库选型
    - 缓存方案选择
    - 消息队列选择
  focus: 功能匹配度、性能、运维成本

架构设计类:
  examples:
    - 服务拆分决策
    - 模块边界划分
    - 通信方式选择
  focus: 扩展性、复杂度、一致性

最佳实践类:
  examples:
    - API设计规范
    - 代码组织规范
    - 错误处理策略
  focus: 团队效率、代码质量

安全合规类:
  examples:
    - 认证方案选择
    - 数据加密策略
    - 日志审计要求
  focus: 安全性、合规性、隐私保护
```

## 注意事项
- ADR是记录而非讨论文档，应简洁明了
- 即使决策后来被证明是错误的，也应保留原始记录
- 每个决策只解决一个架构问题
- 决策状态变更时及时更新文档
- ADR编号按时间顺序递增，不可重复