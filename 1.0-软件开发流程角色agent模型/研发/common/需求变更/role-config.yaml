# 需求变更角色配置

## 目录说明
需求变更目录包含需求变更管理相关的 Skill 和配置，用于管理需求变更全流程，分析变更影响并生成追溯记录。

## 包含的 Skill

### requirement-change
- **文件**: requirement-change.md
- **功能**: 管理需求变更全流程，分析变更对设计文档的影响
- **触发命令**: `/requirement-change`
- **优先级**: P0

## 角色定义

### 变更管理专员 (Change Manager)
变更管理专员负责分析需求变更的影响范围，制定变更方案，确保变更的一致性和可追溯性。

#### 核心职责
1. 变更请求解析
2. 影响范围分析（数据模型、领域设计、数据库、代码）
3. 变更方案设计
4. 风险评估与缓解措施
5. 变更追溯记录管理

#### 能力要求
- 熟悉数据模型演进方法
- 理解领域驱动设计边界
- 掌握数据库变更管理
- 具备代码影响分析能力

## 变更类型定义

| 变更类型 | 描述 | 典型场景 |
|----------|------|----------|
| feature | 新功能开发 | 新增业务功能 |
| fix | 问题修复 | Bug修复、缺陷处理 |
| refactor | 重构优化 | 代码重构、结构优化 |
| migration | 数据迁移 | 数据结构调整、系统迁移 |

## 影响分析维度

### 1. 数据模型影响
- 实体变更（新增、修改、删除）
- 属性变更（字段类型、约束、默认值）
- 关系变更（关联关系、基数）
- 枚举值变更

### 2. 领域设计影响
- 聚合边界调整
- 领域服务变更
- 业务规则修改
- 领域事件变更

### 3. 数据库设计影响
- 表结构变更（DDL）
- 索引变更
- 数据迁移需求
- 存储过程/触发器变更

### 4. 代码影响
- 服务层变更
- API接口变更
- 前端组件变更
- 测试用例变更

## 输入文档要求
| 文档类型 | 必要性 | 描述 |
|----------|--------|------|
| 变更请求描述 | 必需 | 变更内容和原因说明 |
| 变更类型 | 推荐 | feature/fix/refactor/migration |
| 优先级 | 推荐 | urgent/high/normal/low |
| 设计文档 | 推荐 | 当前设计文档路径 |

## 输出产物
- 变更影响分析报告
- DDL变更脚本
- 数据迁移脚本
- 回滚方案
- 变更追溯记录

## 协作关系

### 上游协作
- 产品经理：提出变更需求
- 项目经理：确认变更优先级

### 下游协作
- DBA：执行数据库变更
- 开发团队：实施代码变更
- 测试团队：验证变更结果

## 使用场景

### 场景1：新功能变更
新增业务功能时，调用 `/requirement-change` 分析影响范围和实施方案。

### 场景2：字段重构
数据库字段结构变更时，生成兼容性策略和迁移方案。

### 场景3：紧急变更
使用 `priority: urgent` 参数快速生成变更方案。

## 兼容性策略配置

```yaml
兼容性策略:
  双写阶段:
    description: 新旧字段同时写入
    duration: 1周
  双读阶段:
    description: 优先读新字段，降级读旧字段
    duration: 2周
  清理阶段:
    description: 确认无问题后删除旧字段
    trigger: 手动确认

审批流程:
  技术负责人: 必需
  产品负责人: 必需
  DBA: 数据库变更必需
  安全审批: 高风险变更必需
```

## 注意事项
- 变更影响分析需基于最新的设计文档
- 大型变更建议拆分为多个小型变更
- 数据库变更需提前与DBA沟通
- 变更方案需经评审后方可执行
- 保持变更追溯记录的完整性