# 研发部 Skill 协作关系配置
# 支持按技术栈按需加载skill

# ============================================
# 核心配置：技术栈选择器
# ============================================
tech_selector:
  config_file: "tech-selector.yaml"
  description: "技术栈选择器，根据项目类型自动加载对应skill"

  # 检测流程
  detection_flow:
    - step: 1
      action: "扫描项目文件"
      rules: "tech-selector.yaml -> detection.by_files"
    - step: 2
      action: "分析用户输入关键词"
      rules: "tech-selector.yaml -> detection.by_keywords"
    - step: 3
      action: "确定技术栈"
      output: "tech_stack变量"
    - step: 4
      action: "加载对应skill"
      rules: "tech-selector.yaml -> skill_mapping"
    - step: 5
      action: "排除无关skill"
      rules: "tech-selector.yaml -> exclude_patterns"

# ============================================
# 公共Skill注册表（所有技术栈共用）
# ============================================
common_skills:
  requirement-review:
    name: "需求评审"
    path: "common/requirement-review.md"
    version: "1.0.0"
    priority: "P0"
    description: "辅助研发团队进行需求评审，分析需求完整性、识别设计冲突"

  requirement-change:
    name: "需求变更处理"
    path: "common/requirement-change.md"
    version: "1.0.0"
    priority: "P0"
    description: "管理需求变更全流程，分析变更对设计文档的影响"

  code-review:
    name: "代码审查"
    path: "common/code-review.md"
    version: "1.0.0"
    priority: "P0"
    description: "对代码变更进行自动化审查"

  adr:
    name: "架构决策记录"
    path: "common/adr.md"
    version: "1.0.0"
    priority: "P1"
    description: "创建和管理架构决策记录"

