# ============================================
# 协作关系定义（基于技术栈）
# ============================================
collaboration:

  # 通用协作流程（所有技术栈）
  common_flow:
    requirement-review:
      triggers:
        - type: "command"
          command: "/requirement-review"
        - type: "keyword"
          keywords: ["评审需求", "需求评审"]

      next:
        - skill: "architect"
          condition: "${review_result == 'passed'}"
          # architect的具体实现由tech_selector决定

    requirement-change:
      triggers:
        - type: "command"
          command: "/requirement-change"
        - type: "event"
          event: "change_request_submitted"

      next:
        - skill: "implement"
          condition: "${change_approved == true}"

  # Java/Spring Boot协作流程
  backend/java:
    architect:
      triggers:
        - type: "command"
          command: "/architect"
        - type: "skill"
          skill: "requirement-review"
          condition: "评审通过"

      next:
        - skill: "adr"
          condition: "${major_decisions_count > 0}"

        - skill: "scaffold"
          condition: "${is_new_project == true}"

        - skill: "implement"
          condition: "${is_incremental == true}"

    scaffold:
      next:
        - skill: "implement"

    implement:
      triggers:
        - type: "command"
          command: "/implement"
        - type: "skill"
          skill: "scaffold"

      uses_skills:
        - "api-designer"
        - "entity-designer"
        - "crud-designer"

      next:
        - skill: "code-review"
          condition: "${code_completed == true}"

  # Qt/C++协作流程
  backend/qt:
    architect:
      triggers:
        - type: "command"
          command: "/architect"
        - type: "keyword"
          keywords: ["Qt架构", "桌面应用架构"]

      uses_skills:
        - "ui-designer"

      next:
        - skill: "adr"
          condition: "${major_decisions_count > 0}"

        - skill: "scaffold"
          condition: "${is_new_project == true}"

    scaffold:
      triggers:
        - type: "command"
          command: "/scaffold qt"
        - type: "keyword"
          keywords: ["创建Qt项目", "Qt脚手架"]

      next:
        - skill: "implement"

    implement:
      triggers:
        - type: "command"
          command: "/implement qt"
        - type: "keyword"
          keywords: ["实现Qt功能", "Qt开发"]

      uses_skills:
        - "ui-designer"
        - "signal-slot"
        - "model-view"

      next:
        - skill: "code-review"

  # Vue3协作流程
  frontend/vue:
    scaffold:
      triggers:
        - type: "command"
          command: "/scaffold vue"
        - type: "keyword"
          keywords: ["创建Vue项目", "Vue脚手架"]

      next:
        - skill: "implement"

    implement:
      triggers:
        - type: "command"
          command: "/implement vue"

      uses_skills:
        - "component-designer"
        - "api-client"
        - "state-management"

# ============================================
# 工作流定义
# ============================================
workflows:

  # 新功能开发流程（通用）
  new_feature:
    name: "新功能开发流程"
    description: "从需求评审到代码审查的完整流程"
    steps:
      - id: "tech_detect"
        type: "auto"
        action: "detect_tech_stack"
        config: "tech-selector.yaml"

      - id: "review"
        skill: "requirement-review"
        input:
          requirement_doc: "${workflow.input.requirement}"
        on_failure: "abort"

      - id: "architecture"
        skill: "architect"
        condition: "${review.output.result == 'passed'}"
        tech_stack_aware: true  # 根据技术栈选择具体实现
        on_failure: "notify"

      - id: "development"
        skill: "implement"
        tech_stack_aware: true
        input:
          specification: "${review.output.spec}"
          architecture: "${architecture.output}"

      - id: "review_code"
        skill: "code-review"
        input:
          target: "${development.output.files}"

  # Qt桌面应用开发流程
  qt_desktop_app:
    name: "Qt桌面应用开发流程"
    description: "Qt/C++桌面应用完整开发流程"
    tech_stack: "backend/qt"
    steps:
      - id: "review"
        skill: "requirement-review"

      - id: "architecture"
        skill: "backend/qt/architect.yaml"

      - id: "ui_design"
        skill: "backend/qt/ui-designer.yaml"

      - id: "scaffold"
        skill: "backend/qt/scaffold.yaml"
        condition: "${is_new_project}"

      - id: "implement"
        skill: "backend/qt/implement.yaml"

      - id: "review_code"
        skill: "code-review"

# ============================================
# 错误处理配置
# ============================================
error_handling:
  defaults:
    retry_count: 3
    retry_delay: "5s"
    timeout: "30m"

  errors:
    - code: "TECH_STACK_NOT_DETECTED"
      message: "无法自动检测技术栈"
      solution: "请手动指定技术栈参数"
      action: "ask_user"

    - code: "SKILL_NOT_FOUND"
      message: "指定技术栈下未找到skill"
      solution: "检查skill文件路径"
      action: "fallback_to_common"

# ============================================
# 注意事项
# ============================================
notes:
  - "技术栈检测优先执行，确保只加载相关skill"
  - "exclude_patterns必须严格执行，避免加载无关skill"
  - "tech_stack_aware标记的skill会根据技术栈自动路由"
  - "公共skill（requirement-review等）对所有技术栈都适用"
  - "新增技术栈需要在tech_stack_skills中注册"