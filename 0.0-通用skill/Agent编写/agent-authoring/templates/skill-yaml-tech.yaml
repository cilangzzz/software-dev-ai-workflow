# ============================================
# 技术实现类 Skill 模板
# 这是一个泛型模板，用户可以根据具体需求进行细化
# ============================================

skill:
  # 基本信息部分
  id: "{skill_id}"                 # Skill ID，如 crud-designer, api-designer
  name: "{Skill中文名称}"           # 如 CRUD代码生成器, API设计工具
  version: "1.0.0"
  category: "{分类}"               # implement/design/review/analysis
  description: "{详细描述}"         # Skill的详细功能描述
  priority: "{P0/P1/P2}"           # 优先级
  created_at: "{YYYY-MM-DD}"
  updated_at: "{YYYY-MM-DD}"

# ============================================
# 第一部分：触发条件
# 定义如何触发此Skill
# ============================================
trigger:
  # 命令触发
  commands:
    - "/{command}"                 # 如 /scaffold, /crud-designer

  # 关键词触发
  keywords:
    - "{关键词1}"                   # 如 创建项目, 生成CRUD
    - "{关键词2}"
    - "{关键词3}"

  # 事件触发（可选）
  events:
    - name: "{event_name}"
      condition: "{触发条件}"

# ============================================
# 第二部分：输入参数
# 定义Skill需要的输入参数
# ============================================
input:
  parameters:
    - name: "{param_name}"
      type: "{string/array/object}"
      required: true/false
      default: "{默认值}"          # 可选参数需要默认值
      description: "{参数描述}"
      enum: ["{option1}", "{option2}"]  # 可选，限定范围
      examples: ["{示例}"]

    - name: "{param_name2}"
      type: "{type}"
      required: false
      description: "{描述}"

# ============================================
# 第三部分：执行流程
# 定义Skill的执行步骤
# ============================================
workflow:
  description: "{流程概述}"

  phases:
    - name: "{阶段1名称}"
      description: "{阶段描述}"
      duration: "{预计时间}"
      steps:
        - step: "{步骤名称}"
          action: "{动作描述}"
          condition: "{条件（可选）}"
          reference: "{引用文档（可选）}"

    - name: "{阶段2名称}"
      description: "{描述}"
      steps:
        - step: "{步骤}"
          action: "{动作}"

# ============================================
# 第四部分：输出产物
# 定义Skill产生的输出
# ============================================
output:
  base_path: "{输出路径}"

  artifacts:
    - name: "{产物名称}"
      files: ["{file1}", "{file2}"]
      description: "{产物描述}"

    - name: "{产物名称2}"
      description: "{描述}"

# ============================================
# 第五部分：关联文档引用
# 定义Skill引用的其他文档或Skill
# ============================================
references:
  # 主要引用
  primary:
    - path: "{引用路径}"
      description: "{引用描述}"
      relationship: "{input/output/reference}"
      sections:
        - "{引用章节}"

  # 协作关系
  collaboration:
    - skill: "{关联skill}"
      relationship: "{upstream/downstream/parallel}"
      condition: "{协作条件}"
      description: "{协作描述}"
      path: "{skill路径}"

# ============================================
# 第六部分：质量标准
# 定义Skill输出应满足的质量标准
# ============================================
quality_standards:
  - standard: "{标准名称}"
    requirement: "{要求}"
    check: "{检查方式}"

  - standard: "{标准名称2}"
    requirement: "{要求}"
    check: "{检查方式}"

# ============================================
# 第七部分：使用示例
# 提供具体的使用示例
# ============================================
examples:
  - name: "{示例名称}"
    input: |
      {输入示例内容}
    output_summary: |
      {输出摘要内容}

  - name: "{示例名称2}"
    input: |
      {输入}
    output_summary: |
      {输出}

# ============================================
# 第八部分：依赖工具
# 定义Skill需要使用的工具
# ============================================
tools:
  - name: "{工具名}"               # 如 Read, Write, Bash
    usage: "{使用说明}"

  - name: "{工具名2}"
    usage: "{说明}"

# ============================================
# 第九部分：质量检查清单
# 定义执行前后的检查项
# ============================================
checklist:
  # 执行前检查
  before_execute:
    - item: "{检查项}"
      check: "{检查方式}"

  # 执行中检查
  during_execute:
    - item: "{检查项}"
      check: "{检查方式}"

  # 执行后检查
  after_execute:
    - item: "{检查项}"
      check: "{检查方式}"

# ============================================
# 第十部分：注意事项
# 定义使用此Skill的重要注意事项
# ============================================
notes:
  - "{注意事项1}"
  - "{注意事项2}"
  - "{注意事项3}"